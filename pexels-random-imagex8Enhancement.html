<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexels 隨機圖片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.9);
            }
            to { 
                opacity: 1; 
                transform: scale(1);
            }
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .image-info {
            padding: 15px;
        }

        .image-info p {
            margin: 5px 0;
            color: #555;
            font-size: 14px;
        }

        .photographer {
            font-weight: bold;
            color: #333;
        }

        .view-link {
            display: inline-block;
            margin-top: 8px;
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .view-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading-container {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 18px;
        }

        .api-notice {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #1565c0;
            font-size: 14px;
        }

        .api-notice strong {
            display: block;
            margin-bottom: 5px;
        }

        .api-status {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: #2e7d32;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .api-status.show {
            display: block;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Pexels 隨機圖片（8張）</h1>
        
        <div class="api-notice">
            <strong>🔑 輸入你的 Pexels API 金鑰</strong>
            還沒有？前往 <a href="https://www.pexels.com/api/" target="_blank" style="color: #667eea;">Pexels API</a> 免費註冊取得。
        </div>

        <div class="api-status" id="apiStatus">✅ API 金鑰已儲存</div>

        <div class="controls">
            <input type="password" id="apiKey" placeholder="輸入 API 金鑰（不會顯示）" style="flex: 1; min-width: 250px;">
            <button onclick="saveApiKey()" style="padding: 12px 20px;">💾 儲存金鑰</button>
        </div>

        <div class="controls">
            <input type="text" id="searchTerm" placeholder="輸入搜尋關鍵字（可選，如：nature, city, food）">
            <button id="randomBtn" onclick="getRandomImages()">🎲 隨機抽取 8 張</button>
        </div>

        <div id="gallery" class="gallery">
            <div class="placeholder">點擊按鈕開始抽取圖片 ✨</div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        let API_KEY = '';
        let isLoading = false;

        function saveApiKey() {
            const apiKeyInput = document.getElementById('apiKey');
            const apiStatus = document.getElementById('apiStatus');
            API_KEY = apiKeyInput.value.trim();
            
            if (API_KEY) {
                apiStatus.classList.add('show');
                apiKeyInput.value = ''; // 清空輸入框以增加安全性
            } else {
                alert('⚠️ 請輸入 API 金鑰');
            }
        }

        async function getRandomImages() {
            if (!API_KEY) {
                alert('⚠️ 請先輸入並儲存 API 金鑰');
                return;
            }
            
            if (isLoading) return;
            
            const searchTerm = document.getElementById('searchTerm').value.trim();
            const gallery = document.getElementById('gallery');
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('randomBtn');
            
            isLoading = true;
            btn.disabled = true;
            errorDiv.classList.remove('show');
            
            gallery.innerHTML = '<div class="loading-container"><div class="spinner"></div><p>正在載入圖片...</p></div>';

            try {
                const query = searchTerm || 'random';
                const perPage = 80;
                const randomPage = Math.floor(Math.random() * 10) + 1;
                
                const url = `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=${perPage}&page=${randomPage}`;
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': API_KEY
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('API 金鑰無效，請檢查你的 Pexels API 金鑰是否正確');
                    }
                    throw new Error('API 請求失敗');
                }

                const data = await response.json();
                
                if (data.photos && data.photos.length > 0) {
                    // 隨機選擇 8 張不重複的圖片
                    const selectedPhotos = [];
                    const availablePhotos = [...data.photos];
                    const count = Math.min(8, availablePhotos.length);
                    
                    for (let i = 0; i < count; i++) {
                        const randomIndex = Math.floor(Math.random() * availablePhotos.length);
                        selectedPhotos.push(availablePhotos[randomIndex]);
                        availablePhotos.splice(randomIndex, 1);
                    }
                    
                    gallery.innerHTML = '';
                    
                    selectedPhotos.forEach((photo, index) => {
                        const card = document.createElement('div');
                        card.className = 'image-card';
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        card.innerHTML = `
                            <img src="${photo.src.large}" alt="${photo.alt || '隨機圖片'}" loading="lazy">
                            <div class="image-info">
                                <p class="photographer">📸 ${photo.photographer}</p>
                                <a href="${photo.url}" target="_blank" class="view-link">在 Pexels 上查看 →</a>
                            </div>
                        `;
                        
                        gallery.appendChild(card);
                    });
                    
                    isLoading = false;
                    btn.disabled = false;
                } else {
                    throw new Error('找不到符合的圖片，請嘗試其他關鍵字');
                }
            } catch (error) {
                gallery.innerHTML = '<div class="placeholder">載入失敗 😕</div>';
                errorDiv.textContent = error.message || '發生錯誤，請稍後再試';
                errorDiv.classList.add('show');
                isLoading = false;
                btn.disabled = false;
            }
        }

        document.getElementById('searchTerm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getRandomImages();
            }
        });
    </script>
</body>
</html>
